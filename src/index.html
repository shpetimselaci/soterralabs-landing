<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soterra Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #e8e8e8 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .greeting {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 300;
            color: rgba(160, 165, 175, 0.85);
            letter-spacing: 0.02em;
            margin-bottom: 0.2em;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }

        .love {
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: 400;
            color: rgba(140, 145, 155, 0.7);
            letter-spacing: 0.05em;
            margin-bottom: 4rem;
        }

        .contact {
            margin-top: 2rem;
        }

        .contact p {
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 400;
            color: rgba(130, 135, 145, 0.6);
            letter-spacing: 0.03em;
            margin: 0.5em 0;
        }

        .contact a {
            color: rgba(130, 135, 145, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: rgba(100, 105, 115, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="greeting">Welcome to Soterra Labs</h1>
        <p class="love">I love you</p>

        <div class="contact">
            <p>Kosovo</p>
            <p><a href="mailto:inquiries@soterralabs.co">inquiries@soterralabs.co</a></p>
        </div>
    </div>
</body>
</html>
